<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Crear Cuenta</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <ion-list lines="full">
      <ion-item>
        <ion-label position="stacked">Nombre</ion-label>
        <ion-input formControlName="name" autocomplete="given-name"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Apellido</ion-label>
        <ion-input formControlName="lastname" autocomplete="family-name"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Tipo de documento</ion-label>
        <ion-select formControlName="documentType" interface="popover">
          <ion-select-option *ngFor="let dt of documentTypes" [value]="dt.value">
            {{ dt.label }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Número de documento</ion-label>
        <ion-input type="tel" inputmode="numeric" formControlName="documentNumber"></ion-input>
      </ion-item>
      <ion-note color="danger" *ngIf="form.controls.documentNumber.touched && form.controls.documentNumber.invalid">
        Número de documento inválido
      </ion-note>

      <ion-item>
        <ion-label position="stacked">País</ion-label>
        <ion-input formControlName="country"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Email</ion-label>
        <ion-input type="email" formControlName="email" autocomplete="email"></ion-input>
      </ion-item>
      <ion-note color="danger" *ngIf="form.controls.email.touched && form.controls.email.invalid">
        Email inválido
      </ion-note>

      <ion-item>
        <ion-label position="stacked">Contraseña</ion-label>
        <ion-input type="password" formControlName="password" autocomplete="new-password"></ion-input>
      </ion-item>
      <ion-note color="danger" *ngIf="form.controls.password.touched && form.controls.password.invalid">
        Mínimo 6 caracteres
      </ion-note>
    </ion-list>

    <ion-button expand="block" type="submit" [disabled]="loading" class="ion-margin-top">
      <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
      <span *ngIf="!loading">Registrarme</span>
    </ion-button>

    <ion-button expand="block" fill="clear" type="button" (click)="goToLogin()">
      Ya tengo cuenta
    </ion-button>
  </form>
</ion-content>
